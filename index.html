<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360Digital, Co. | Partner Portal</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        const CONFIG = {
            clientId: "c89a2441-cb70-43f2-b78b-34db6223b33a",
            redirectUri: "https://360digitalco.github.io",
            edgeFunctionUrl:
                "https://wiswfpfsjiowtrdyqpxy.supabase.co/functions/v1/oauth-exchange"
        };

        async function sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hash = await crypto.subtle.digest("SHA-256", data);
            return new Uint8Array(hash);
        }

        function base64url(bytes) {
            let binary = "";

            for (const b of bytes)
                binary += String.fromCharCode(b);

            return btoa(binary)
                .replace(/\+/g, "-")
                .replace(/\//g, "_")
                .replace(/=+$/, "");
        }

        function randomString(length = 64) {
            const chars =
                "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

            const array = new Uint8Array(length);

            crypto.getRandomValues(array);

            return [...array]
                .map(v => chars[v % chars.length])
                .join("");
        }

        async function redirectToSupabaseAuth() {

            const state = crypto.randomUUID();

            const codeVerifier = randomString(96);

            const challengeBytes = await sha256(codeVerifier);

            const codeChallenge = base64url(challengeBytes);

            sessionStorage.setItem(
                "oauth_state",
                state
            );

            sessionStorage.setItem(
                "code_verifier",
                codeVerifier
            );

            const params = new URLSearchParams({
                client_id: CONFIG.clientId,
                redirect_uri: CONFIG.redirectUri,
                response_type: "code",
                state: state,
                code_challenge: codeChallenge,
                code_challenge_method: "S256"
            });

            window.location.href =
                `https://api.supabase.com/v1/oauth/authorize?${params.toString()}`;
        }

        async function processOAuthCallback() {

            const params = new URLSearchParams(window.location.search);

            const code = params.get("code");

            if (!code)
                return;

            const state = params.get("state");

            const storedState =
                sessionStorage.getItem("oauth_state");

            if (state !== storedState) {

                document.getElementById("display-status").innerText =
                    "Security Check Failed";

                document.getElementById("display-desc").innerText =
                    "OAuth state validation failed.";

                return;
            }

            const verifier =
                sessionStorage.getItem("code_verifier");

            if (!verifier) {

                document.getElementById("display-status").innerText =
                    "Missing PKCE";

                document.getElementById("display-desc").innerText =
                    "Code verifier missing.";

                return;
            }

            document.getElementById("display-status").innerText =
                "Connecting Workspace...";

            document.getElementById("display-desc").innerText =
                "Waiting for secure token exchange...";

            try {

                const response = await fetch(
                    CONFIG.edgeFunctionUrl,
                    {
                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/json"
                        },

                        body: JSON.stringify({

                            code,

                            redirectUri:
                                CONFIG.redirectUri,

                            codeVerifier:
                                verifier

                        })
                    }
                );

                const data =
                    await response.json();

                if (!response.ok)
                    throw new Error(
                        data.error ||
                        "Unknown error"
                    );

                sessionStorage.removeItem(
                    "oauth_state"
                );

                sessionStorage.removeItem(
                    "code_verifier"
                );

                history.replaceState(
                    {},
                    document.title,
                    window.location.pathname
                );

                document.getElementById(
                    "display-status"
                ).innerText =
                    "Workspace Connected";

                document.getElementById(
                    "display-desc"
                ).innerText =
                    "Your Supabase organization has been connected successfully.";

                console.log(
                    "OAuth Success",
                    data
                );

            } catch (error) {

                console.error(error);

                document.getElementById(
                    "display-status"
                ).innerText =
                    "Connection Failed";

                document.getElementById(
                    "display-desc"
                ).innerText =
                    error.message;
            }

        }

        window.addEventListener(
            "DOMContentLoaded",
            processOAuthCallback
        );
    </script>
</head>

<header class="border-b border-slate-800 bg-slate-950 px-6 py-4 flex justify-between items-center">

<div class="flex items-center space-x-3">

<div class="bg-black-600 text-white font-black px-3 py-1.5 rounded-lg text-lg tracking-wider">

360Digital

</div>

<span class="text-xl font-bold tracking-tight">

360Digital, Co.

</span>

</div>


</header>

<main class="flex-grow flex items-center justify-center p-6">


</main>

</body>

</html>
