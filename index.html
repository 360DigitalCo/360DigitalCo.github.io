<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>360Digital, Co. | Connect Supabase</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // ---------------------------------------------------------------------
  // CONFIG
  // ---------------------------------------------------------------------
  const CONFIG = {
    // 360's own Supabase project — used for 360 account sign-in.
    supabaseUrl: "https://wiswfpfsjiowtrdyqpxy.supabase.co",
    supabaseAnonKey: "sb_publishable_thiEv1nfaZ1ng1Wd1IG5Vw_r68ix0B9",

    // The OAuth App registered under Supabase org settings > OAuth Apps.
    // Placeholder until the real client_id is available — replace before going live.
    mgmtClientId: "0f1f4cfd-2b52-47b6-92d0-781524f2bd34",

    // Must exactly match a redirect URI registered on that OAuth App (no wildcards).
    redirectUri: "https://360digitalco.github.io",

    // Our own edge functions do the server-side token exchange —
    // the client_secret never touches this page.
    exchangeUrl: "https://wiswfpfsjiowtrdyqpxy.supabase.co/functions/v1/supabase-mgmt-exchange",
    statusUrl: "https://wiswfpfsjiowtrdyqpxy.supabase.co/functions/v1/supabase-mgmt-status",
    disconnectUrl: "https://wiswfpfsjiowtrdyqpxy.supabase.co/functions/v1/supabase-mgmt-disconnect",

    scopes: "all", // see Supabase docs > "Scopes for your OAuth App" for restricting this
  };

  const supabase = createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);

  // ---------------------------------------------------------------------
  // PKCE helpers
  // ---------------------------------------------------------------------
  async function sha256(text) {
    const digest = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
    return new Uint8Array(digest);
  }
  function base64url(bytes) {
    let binary = "";
    for (const b of bytes) binary += String.fromCharCode(b);
    return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  function randomString(length = 64) {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    const arr = new Uint8Array(length);
    crypto.getRandomValues(arr);
    return [...arr].map((v) => chars[v % chars.length]).join("");
  }

  // ---------------------------------------------------------------------
  // UI state
  // ---------------------------------------------------------------------
  const els = {
    status: document.getElementById("display-status"),
    desc: document.getElementById("display-desc"),
    signinBtn: document.getElementById("signin-btn"),
    connectBtn: document.getElementById("connect-btn"),
    disconnectBtn: document.getElementById("disconnect-btn"),
    connectionCard: document.getElementById("connection-card"),
  };

  function setStatus(title, desc) {
    els.status.textContent = title;
    els.desc.textContent = desc;
  }

  async function getAccessToken() {
    const { data } = await supabase.auth.getSession();
    return data.session?.access_token ?? null;
  }

  // ---------------------------------------------------------------------
  // Step 1: sign in to 360 (needed so we know whose account to attach the
  // Supabase Management grant to)
  // ---------------------------------------------------------------------
  els.signinBtn.addEventListener("click", async () => {
    await supabase.auth.signInWithOAuth({
      provider: "github",
      options: { redirectTo: window.location.origin + window.location.pathname },
    });
  });

  // ---------------------------------------------------------------------
  // Step 2: kick off the Supabase Management OAuth flow
  // ---------------------------------------------------------------------
  async function startManagementConnect() {
    const state = crypto.randomUUID();
    const codeVerifier = randomString(96);
    const codeChallenge = base64url(await sha256(codeVerifier));

    sessionStorage.setItem("mgmt_oauth_state", state);
    sessionStorage.setItem("mgmt_code_verifier", codeVerifier);

    const params = new URLSearchParams({
      client_id: CONFIG.mgmtClientId,
      redirect_uri: CONFIG.redirectUri,
      response_type: "code",
      state,
      code_challenge: codeChallenge,
      code_challenge_method: "S256",
    });

    window.location.href = `https://api.supabase.com/v1/oauth/authorize?${params.toString()}`;
  }
  els.connectBtn.addEventListener("click", startManagementConnect);

  // ---------------------------------------------------------------------
  // Step 3: handle the redirect back from Supabase with ?code&state
  // ---------------------------------------------------------------------
  async function processOAuthCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (!code) return false;

    const error = params.get("error");
    if (error) {
      setStatus("Connection declined", `Supabase returned: ${error}`);
      history.replaceState({}, document.title, window.location.pathname);
      return true;
    }

    const state = params.get("state");
    const storedState = sessionStorage.getItem("mgmt_oauth_state");
    if (!state || state !== storedState) {
      setStatus("Security check failed", "OAuth state did not match. Please try connecting again.");
      history.replaceState({}, document.title, window.location.pathname);
      return true;
    }

    const verifier = sessionStorage.getItem("mgmt_code_verifier");
    const accessToken = await getAccessToken();
    if (!accessToken) {
      setStatus("Sign in required", "Sign in to your 360 account first, then reconnect Supabase.");
      history.replaceState({}, document.title, window.location.pathname);
      return true;
    }

    setStatus("Connecting workspace…", "Exchanging your authorization for an access token.");

    try {
      const res = await fetch(CONFIG.exchangeUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${accessToken}`,
        },
        body: JSON.stringify({ code, redirect_uri: CONFIG.redirectUri, code_verifier: verifier }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Unknown error");

      sessionStorage.removeItem("mgmt_oauth_state");
      sessionStorage.removeItem("mgmt_code_verifier");
      history.replaceState({}, document.title, window.location.pathname);

      setStatus("Workspace connected", "Your Supabase organization is now connected to 360Digital.");
    } catch (err) {
      setStatus("Connection failed", String(err.message || err));
    }
    return true;
  }

  // ---------------------------------------------------------------------
  // Refresh the on-screen connection status
  // ---------------------------------------------------------------------
  async function refreshConnectionStatus() {
    const accessToken = await getAccessToken();
    if (!accessToken) {
      els.signinBtn.classList.remove("hidden");
      els.connectBtn.classList.add("hidden");
      els.connectionCard.classList.add("hidden");
      return;
    }
    els.signinBtn.classList.add("hidden");
    els.connectBtn.classList.remove("hidden");

    const res = await fetch(CONFIG.statusUrl, {
      headers: { Authorization: `Bearer ${accessToken}` },
    });
    const data = await res.json().catch(() => ({ connected: false }));

    if (data.connected) {
      els.connectBtn.classList.add("hidden");
      els.connectionCard.classList.remove("hidden");
      document.getElementById("connection-expires").textContent = new Date(data.expires_at).toLocaleString();
    } else {
      els.connectionCard.classList.add("hidden");
    }
  }

  els.disconnectBtn.addEventListener("click", async () => {
    const accessToken = await getAccessToken();
    if (!accessToken) return;
    await fetch(CONFIG.disconnectUrl, {
      method: "POST",
      headers: { Authorization: `Bearer ${accessToken}` },
    });
    await refreshConnectionStatus();
    setStatus("Disconnected", "360Digital no longer has access to your Supabase organization.");
  });

  // ---------------------------------------------------------------------
  // Boot
  // ---------------------------------------------------------------------
  window.addEventListener("DOMContentLoaded", async () => {
    const handledCallback = await processOAuthCallback();
    await refreshConnectionStatus();
    if (!handledCallback) {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        setStatus("Connect your workspace", "Authorize 360Digital to manage your Supabase projects.");
      } else {
        setStatus("Sign in required", "Sign in to your 360 account to connect Supabase.");
      }
    }
  });
</script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between font-sans">

<header class="border-b border-slate-800 bg-slate-950 px-6 py-4 flex justify-between items-center">
  <div class="flex items-center space-x-3">
    <div class="bg-blue-600 text-white font-black px-3 py-1.5 rounded-lg text-lg tracking-wider">360D</div>
    <span class="text-xl font-bold tracking-tight">360Digital, Co.</span>
  </div>
  <span class="text-xs font-mono px-3 py-1 rounded bg-emerald-950 text-emerald-400 border border-emerald-800">
    GitHub Pages Production
  </span>
</header>

<main class="flex-grow flex items-center justify-center p-6">
  <div class="max-w-md w-full bg-slate-950 border border-slate-800 rounded-2xl shadow-2xl p-8 text-center">

    <div class="flex justify-center items-center gap-3 mb-6">
      <span class="bg-blue-950 border border-blue-800 px-3 py-1 rounded-full text-xs text-blue-400">360Digital</span>
      <span class="text-slate-600 font-bold">×</span>
      <span class="bg-emerald-950 border border-emerald-800 px-3 py-1 rounded-full text-xs text-emerald-400">Supabase</span>
    </div>

    <h1 id="display-status" class="text-2xl font-bold mb-2">Loading…</h1>
    <p id="display-desc" class="text-slate-400 text-sm mb-8"></p>

    <button id="signin-btn" class="hidden w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl py-3 px-4 transition active:scale-95 mb-3">
      Sign in to 360
    </button>

    <button id="connect-btn" class="hidden w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl py-3 px-4 flex items-center justify-center transition active:scale-95">
      <svg class="w-5 h-5 text-emerald-400 mr-3" viewBox="0 0 24 24" fill="currentColor">
        <path d="M21.362 9.354H13.62V1.9a1.218 1.218 0 0 0-2.072-.868l-8.91 8.91a1.217 1.217 0 0 0 .86 2.076h7.743v7.454a1.218 1.218 0 0 0 2.072.868l8.91-8.91a1.217 1.217 0 0 0-.86-2.076z"/>
      </svg>
      Connect Supabase
    </button>

    <div id="connection-card" class="hidden mt-2 border border-emerald-900 bg-emerald-950/40 rounded-xl p-4 text-left">
      <div class="text-sm text-emerald-400 font-semibold mb-1">Connected</div>
      <div class="text-xs text-slate-400">Token refreshes until <span id="connection-expires"></span></div>
      <button id="disconnect-btn" class="mt-3 text-xs text-red-400 hover:text-red-300 underline">Disconnect</button>
    </div>

    <div class="mt-8 border-t border-slate-800 pt-6 text-left">
      <div class="text-xs uppercase tracking-wider text-slate-500 mb-2">System Status</div>
      <div class="space-y-3 text-sm">
        <div class="flex items-center justify-between"><span class="text-slate-400">PKCE</span><span class="text-emerald-400 font-mono text-xs">Enabled</span></div>
        <div class="flex items-center justify-between"><span class="text-slate-400">State Validation</span><span class="text-emerald-400 font-mono text-xs">Enabled</span></div>
        <div class="flex items-center justify-between"><span class="text-slate-400">Secret Exposure</span><span class="text-emerald-400 font-mono text-xs">Server-side only</span></div>
      </div>
    </div>

  </div>
</main>

<footer class="border-t border-slate-800 py-5 text-center text-xs text-slate-500 bg-slate-950">
  <div>© 2026 360Digital, Co.</div>
  <div class="mt-2">Powered by Supabase Management OAuth</div>
</footer>

</body>
</html>
